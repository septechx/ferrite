    # ModrinthProject
    - name: String
      identifier: !ModrinthProject String
      slug: String
    # CurseForgeProject
    - name: String
      identifier: !CurseForgeProject i32
      slug: String
    # GitHubRepository
    - name: String
      identifier: !GitHubRepository
      - String
      - String
      slug: String
