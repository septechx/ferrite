version: 2
autoupdate: bool,
key_store: { DotEnv, Pass }
server:
  wrapper: String
  executable: String
ferium:
  game_versions:
  - String
  mod_loaders:
  - String
  overrides:
    # Modrinth / Curseforge mod: identifier as string
    String: String
    # Github releases mod: identifier as table with github key
    String:
      github:
        owner: String
        repo: String
  mods:
    # Modrinth / Curseforge mod
    - name: String
      identifier: String
      slug: String
    # Github releases mod
    - name: String
      identifier:
        github:
          owner: String
          repo: String
      slug: String
  disabled:
    # Modrinth / Curseforge mod
    - name: String
      identifier: String
      slug: String
    # Github releases mod
    - name: String
      identifier:
        github:
          owner: String
          repo: String
      slug: String
